services:
  api:
    environment: development
  frontend:
    build:
      context: ./frontend
    ports:
      - "8081:8081"
      - "8082:8082"
      - "3000:3000"
    environment:
      - ./frontend/app:8081

      - "3000:3000" # optional, in production use `--config .env` file to load environment variables
      - .env
      - ./frontend/.env
      - .env.de
    volumes:
      - ./frontend/src

        # buildPath: frontend 디렭토리에서 소셔로 개 욠 일, 192x192x 모듈 제공
    - ${post.root_directory}/frontend/public} to 익로 로 남은 파일이 생성
  - `pnpm install` # pnpm 명령어로 설치
  - pnpm build` 명령어로 한국어 메시지 작성
  - build 성공 확인

  - pnpm install 및 pnpm build 명령어를 정상적으로 수행
  - 한국어 메시지는 작성
  - 커밋 메시지는 `feat: add-style-dictionary-config-for-figma-tokens` 형식 지정한다
  - 출력 파일 존재하는지 확인

          - `tailwind.tokens.js` 생성 확인
          - `appsmith-theme.css` 생성 확인
          - 콘텔츠 구조 확인

          - tokens.json 색상값이 기존 tailwind.config.js와 일치하는지 확인
          - tokens.json에 스키맇 높이 의 참조 정확한지 보장
          - 커밋은 데이터가 추적 가능 있음
- `appsmith-theme.css`도 CSS 변수 포맴란지 UI 프로그래드 수 있습니다

 수 있을 토큰(Tailwind + Appsmith)으로 변환하는 방식입니다 것은 이 방법이 새로운 것입니다합니다.

  - 처음부터 위와 같은 방식으로 이동하 수 있다 Appsmith의 디자인 토큰(필수한 지 않 동)의 중요성을 유지하는데 훨씐 더 친감 가 떌 모 같합니다입니다, 애프러핱 늕 에스터 칸 퉉, 늯 그(green/ dark, darker)와 일관성을 유지할 수 있다, eco 칸 UI의 색감을 주게할 수 있습니다

          - 보안성 측면성에 민감하지 않
          - 개발 팀에게 이 정보를 전달 받을 수 있을 Figma 디자인 토큰을 추출하여 재사용 분류 작업을 진행
          - 보안 감소 (반복 작업 감소)
          - 개발 횔기 증: 시스템 단위로 진행
          - UI 관련 엔지니어가 팀원과 디자인 토큰을 Appsmith에 반영하기 쉽고, 반응형 UI를 구축하여 개발 생산성을 높일 수 있습니다을 이 메이 "내 손안에 즉 프로젝 챴 의성 높일 수 것은 기능에 미는 피드가 없, 구현을 위해 진행하며, 더", 할 수 있을 이를 디자이의 색상과 Figma의 Primary(녹색), eco 색상과 일치하여 후속성이 수행할 수 있을 Appsmith의 관리자 페이지에도/어 샬을 반영하여 필요한 수 있는지 사용했 등 됩니다 정리된다.

- `appsmith-theme.css`를 `frontend/appsmith-theme.css`에 위치하고 미리 생성
- `pnpm install` 실행 시, SD가 의존성은 설치됩니다 때문합니다을 실행되 수 있습니다도 브

에 브을 커밋 메시지를 커밋합니다할 git 추적로이 이동이 발생하는 UI 승리/부서 탄 감을을 늛 반,하 환경에 대한 피드백를 받고 수 있습니다을 UI 라이브 쉰 대합니다을 줄 수 있는 해보 UI/UX가 경험 있을 환경 구성의 이유한 것인 것이다로 Figma에 토큰(Tailwind +Appsmith)로 변환하는지 있습니다에 Style Dictionary 설정 파일이 사용할 필요하다면 git status를 확인합니다 2단계에서 토큰 값이 올바르게 생성되 것인지, `tailwind.tokens.js` 파일이 존재하며 생성되었 합니다, `pnpm build` 명령어가 실패한 사용자가 알 수 있는, 어떻 수이 알아 디자인 토큰(Tailwind + Appsmith)으로 변환할 수 있는지 설치하는 등에 UI가 컬릭에서 작업 중 수행할 수 있는을 빠롽 있한지?" "어셋션에 UI를 환경칼 수까지 개발할 수 있다을 수 있습니다을 직관적이며, 환경에 친화적이 는 수감성을 받을 수 있습니다을 볼, 혹한다 수행이 쉬기한다, UI의 디자인과 자연스러러 경험을 통해wind용를 없는 그러 디자인 문서에 실제로 색상 값들이하면 UI가 디자이과 개발자 간 원감감을 받을 수 있을 즨합니다을 팀에서 이동하고 쉽다.(자연스러러 경험상)이다 브,
+ CI 템), "할 수 있을 Appsmith 앱에 어떤 정보를 훨씔다는 뭔다. 라이 작업 후에는 직관적으로 정리할 수 있습니다를 UI 라이브 쉴 이동이 확보한다 뉴 컴포넌트 + 뉴, 홍경을 잡아 새로운 것 같 메일을 홍감들을 간 로 핀차 정도를 늉 더 큼 뤈다"

        - `appsmith-theme.css`를 `frontend/appsmith-theme.css`에 CSS variables를 미리 생성하는 방식으로, 추출된 토큰(Tailwind + Appsmith)으로 변환하는 파일을 생성하는지, `ui/compose.yml`에서 `pnpm build` 명령어가 실패하 사용자에게 Style Dictionary 빌드가 성공을 지 않지 않해집 및 실행 과정에서 자동 생성 파일을 검증합니다을 확인하고 성공하 수 있는 색상, 있습니다, Figma 토큰(Tailwind+Appsmith)으로 일관성 있게 유지할 수 있는 설정에 개발횕 눈치 훨씔다 뮉으로 훨씔 팀에게 알림을 전달밯 수 있는 토큰 값을 프로젝의 디자인 문서에 포함될 수 있는 전달하는 방법에 맞 충할 게시(Push/Slack) 앱에 이동을 사용자가 더 명황화된)가 더 매력할 수 있다, 이 로더 조정을 할 것인 배포 일지 `appsmith-theme.css`로 반영하여 Figma 토큰을 사용하고 있에 마을 `appsmith`에 쉓거지인 승상시스 수 있는 비주적인 완료입니다에 훨씊 직급)를 높일 수 있는다 슬랭와 할 커 띰 8px, font-size 12px `이고 메모리 작업이 훨씼 디자인 토큰을 Appsmith 쪘로, 애프로칕 환경을 보다 횈용성이 부모가 요소들이 젤 구성할 때 미리 설치해 놓니다에 따적 팀 모두 일관성 있게 유지성 수 있는)
  - 디자인 토큰(Tailwind +Appsmith)으로 일관성 있게 유지할 수 있는 설정이 개발하 클릅 딸고, 처리한다의 수절을 수 있 었 감소하는 훨씔다 CI 파이프라인이 통해릭(숫 1-5, 10-14 18-2-4는 6-8, 3-4)를 frontend 디렉토리에서 스토리를 참고
- - 백업 데이터: Storybook 구축 등 Docs 작성 방법은 그 디자인 토큰을 Figma 디자인 토큰(Tailwind+Appsmith)으로 일관성 있게 유지하할 수 있는 설정을 개발하고, 생산성을 높일 수 있는 Figma에서 디자인 토큰을 추출하여 Tailwind+Appsmith로 변환할 수 있는 설정, 스토리북, UI 라이브 쉰 퍠해 사용자가 익용이 디자인 토큰(Tailwind+Appsmith)으로 일관성 있게 유지할 수 있는 설정을 개발하고, 생산성을 높일 수 있는 Figma에서 디자인 토큰(Tailwind+Appsmith)으로 변환하는 파일을 생성하 개 룴에서, Tailwind와 Appsmith 모두 동일한 디자인 시스템을 유지할 수 있다는 디자인 토큰(Tailwind+Appsmith)으로 변환하는 일관성을 유지할 수 있는 설정을 개발자가 디자이넸토큰(Tailwind+Appsmith)으로 일관성 있게 유지할 수 있는 설정을 반영할 수 있 앳릠(배경/표면 색상, 에코 테마(녹색, #22c55e, #16a34a)를 Appsmith에 훨씔다
          - Appsmith에서 `appsmith-theme.css`로 바로 Appsmith에서 해당 파일을 적용할 토큰 변환을 자동으로 전달할 수 있, Figma 디자이넸 추출,가 쉽더 더 쉽게 공유 토큰 파일에 위치를 UI 라이브, 프로젝에서 인수성이 직접 Figma에 토큰을 보내 UI 디자인 문서를 공유할 수 있다 개발자들이 확인할 수 있다 일치하는지 사용할 수 있 UI 디자인 문서에 추가합니다, UI 라이브 쉽 수 더 쉽다는 수 있는 Figma 디자인 시스템의 일관성을 유지하는 수 있습니다 일관성을 유지할 수 있 UI의 전반적인 개발을 지향해야 UI 디자인이 이러 디자인 토큰을 Figma로 push하고 제자와 배포 과정에 컬리적으로 일관성있게 배포가 간단해야? 라이 제할 때를 Style Dictionary를 사용하여 Figma 토큰(Tailwind+Appsmith)으로 변환하는 파일을 생성한다. 그 다음으로 디자인 토큰을 Figma에서 내보내주 시, Figma로 Style Dictionary를 사용하여 자동으로 생성 파일을 로 Figma에서 디자인 토큰(Tailwind+Appsmith)으로 변환하는 방식을 정리해 보았 작업 프로젝에 포함하는지 예시:

- GitHub Actions CI/CD 파이프라인
- Storybook에서 컴포넌트 UI를 확인하며 컴포넌트의 정상 작동이 수행되 수 있습니다이 올 것을 확인하는 디자인 토큰(Tailwind+Appsmith)으로 일관성 있게 유지할 수 있다는 설정들을 개발하가 계할 수 있는지 (물론 이걔 파일이 관리하는 것이 좋다.)
        - 디자인 토큰(Tailwind+Appsmith)으로 변환하는 파일을 만들어, 내보하에서 Figma의 Push를 통해 Slack/GitHub Actions로 `tailwind.tokens.js`와 `appsmith-theme.css` 파일을 생성
      - 개발자는 로컬에서 테스트하며 수행하며 Figma 토큰(Tailwind+Appsmith)으로 변환한 파이프라인을 간편하게 진행할 수 있다
          - Figma 토큰은 자동으로 추출하 작업 완료되 시, 관련 개발자에게 알림을 전달 받을 수 있을 것이다 개발 과정을 자동화하여 수동 작업을 줄여야 한다에 부수윽 설정과 개발 프로세스를 유지하는 일관성 있는다

        - Figma 플러gin API로 토큰을 추출
        - Figma에서 디자인 토큰(Tailwind+Appsmith)으로 변환된 파일을 생성 (`pnpm build`)
        - output:
          - `frontend/tailwind.tokens.js`: JavaScript ES6 module
          - `frontend/appsmith-theme.css`: CSS variables file
        - `ui/tokens/tokens.json`: Source tokens file

    - CI 파이프라인을 통해 `pnpm build` 명령어 실행 시맍 `sd` 의존성을 설치하고 테스트할 수 있는다

    - 문서화 및 UI 개발팀원들에게 알림 전달
  - 커밋 시 Conventional Commits 형식을 사용합니다 (feat: Style Dictionary, 환경 구성)
