# NOTE: Apply with envsubst: envsubst < postgres-secret.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: waste-helper
type: Opaque
stringData:
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  GF_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
  JWT_BASE64_SECRET: ${JWT_BASE64_SECRET}
